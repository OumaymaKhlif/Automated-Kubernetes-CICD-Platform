---
# Installe le client NFS pour pouvoir monter les partages distants
- name: Installer nfs-common
  apt:
    name: nfs-common
    state: present

# Crée le point de montage local
- name: Créer le point de montage
  file:
    path: "{{ nfs_mount_point }}"
    state: directory

# Monte le dossier NFS de vm-service sur le worker
# rw = lecture/écriture
# sync = écriture synchrone (données sûres)
# hard = remonte automatiquement si connexion perdue
- name: Monter le partage NFS
  mount:
    path: "{{ nfs_mount_point }}"
    src: "{{ nfs_server_ip }}:{{ nfs_export_path }}"
    fstype: nfs
    opts: "rw,sync,hard"
    state: mounted
