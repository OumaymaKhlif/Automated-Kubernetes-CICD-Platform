apiVersion: v1
# expose le backend sur le réseau.
kind: Service
metadata:
  name: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30091
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: 192.168.56.10:8082/backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000
          # le backend écoute sur le port 5000 dans le conteneur.
